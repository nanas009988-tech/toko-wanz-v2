<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Basic Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Meta -->

    <meta name="author" content="WANZ SHOP">

    <!-- Open Graph -->
    <meta property="og:title" content="WANZ SHOP - Top Up Game Murah & Cepat">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- =========================
         LOADING SCREEN
    ========================== -->
    <div id="loading-screen" aria-label="Loading Screen">
        <div class="loading-content">
            <h1 class="loading-logo">Wanzshop</h1>
        </div>
    </div>

    <!-- =========================
         MAIN WEBSITE
    ========================== -->
    <div id="app">

        <!-- Header -->
        <header class="site-header">
    <div class="container">

        <div class="header-top">
            <img src="assets/logo.png"

        </div>

        <div class="hero-banner">

    <img src="assets/banner.png" alt="Banner Wanz Shop" class="promo-banner">

</div>

    </div>
</header>

        <!-- Main Content -->
        <main class="site-main">

            <!-- Game Section -->
            <section class="games-section" aria-labelledby="games-heading">

</div>

                    <div class="game-grid">

                        <article

                            data-game="Bloodstrike"
                            aria-label="Bloodstrike">
                            <figure class="game-card-media">
                                <img
                                    src="assets/bs.jpeg"
                                    alt="Bloodstrike"
                                    loading="lazy">

                            </div>

                            </div>

                            <div class="game-card-content">
                                <h3 class="game-title">PUBG Mobile</h3>

<article
    class="game-card"
    data-game="Genshin Impact"

    <div class="game-card-content">

    </div>
</article>

                        <article

                            </figure>
